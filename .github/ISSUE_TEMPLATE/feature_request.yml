name: Feature Request
description: Suggest an improvement or new capability
labels: ["feature-request", "needs-triage"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this has not been requested before
          required: true

  - type: dropdown
    id: service
    attributes:
      label: Related service (if applicable)
      options:
        - OrderService
        - PaymentIntentService
        - PaymentMethodService
        - CouponService
        - CustomerService
        - SubscriptionService
        - CheckoutSessionService
        - ItemService
        - RefundService
        - MerchantService
        - SettingsService
        - New service / other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or limitation you're running into.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? New endpoint, field, behavior, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or other approaches that could work.
    validations:
      required: false
